# Remap prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:RGB,xterm-256color:RGB"

# Enable mouse
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Faster escape time (important for nvim)
set -sg escape-time 0

# Increase history
set -g history-limit 50000

# Focus events (needed for nvim autoread)
set -g focus-events on

# Better splits — use | and - (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl+hjkl (repeatable)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 3
bind -r C-k resize-pane -U 3
bind -r C-l resize-pane -R 5

# Quick reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Dev layout: nvim top (70%), claude bottom (30%)
bind D split-window -v -l 30% -c "#{pane_current_path}" \; send-keys "claude" Enter \; select-pane -U

# ── Kanagawa Dragon Theme ──────────────────────────────

# Status bar
set -g status-position bottom
set -g status-style "bg=#181616,fg=#c5c9c5"
set -g status-interval 5

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#181616,bg=#c4b28a,bold]  #S #[fg=#c4b28a,bg=#181616,nobold] "

# Right: date & time
set -g status-right-length 50
set -g status-right "#[fg=#8a9a7b] %H:%M #[fg=#545454]│ #[fg=#8ba4b0] %b %d "

# Window tabs
set -g window-status-format "#[fg=#545454] #I #[fg=#a6a69c]#W "
set -g window-status-current-format "#[fg=#181616,bg=#8a9a7b,bold] #I #W #[fg=#8a9a7b,bg=#181616,nobold]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#282727"
set -g pane-active-border-style "fg=#c4b28a"

# Message style
set -g message-style "fg=#c4b28a,bg=#181616"
set -g message-command-style "fg=#c4b28a,bg=#181616"

# Selection / copy mode
setw -g mode-style "fg=#181616,bg=#c4b28a"

# ── Plugins ──────────────────────────────────────────

# Plugin manager (TPM)
set -g @plugin 'tmux-plugins/tpm'

# Save/restore sessions across restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Bootstrap TPM (auto-install if missing)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/bin/install_plugins'
run '~/.tmux/plugins/tpm/tpm'
